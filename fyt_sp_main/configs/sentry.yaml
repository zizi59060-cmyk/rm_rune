# enemy_color: "red"
enemy_color: "blue"


#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
#device: GPU
device: CPU
min_confidence: 0.8
use_traditional: trues
auto_buff:
  conf_threshold: 0.8
  nms_threshold: 0.3

buff_model_path: "assets/yolox_buff.engine"
#####-----ROI-----#####
roi: 
  x: 420
  y: 50
  width: 600  
  height: 600

use_roi: false

#####-----USB相机参数-----#####
image_width: 1280
image_height: 720
fov_h: 57.7 #87.7
fov_v: 56.7 
new_fov_h: 27 #67
new_fov_v: 40.9
usb_frame_rate: 120
usb_exposure: 500 #1-80000______250
usb_gamma: 160
usb_gain: 10 #0-96

#####-----工业相机参数-----#####
# camera_name: "hikrobot"
# exposure_ms: 10
# gain: 16.9
# vid_pid: "2bdf:0001"
# camera_name: "mindvision"
# exposure_ms: 2
# gamma: 0.5
# vid_pid: "f622:d13a"
camera_name: "daheng"   # <-- 启用大恒相机
exposure_ms: 5  # 曝光时间，单位是毫秒
gain: 5.0               # 增益
vid_pid: "0000:0000"    # GxAPI 通常使用序列号或 IP，但保留此项以兼容现有结构

# -1  0  0
#  0 -1  0
#  0  0  1
# R_gimbal2imubody: [-1, 0, 0, 0, -1, 0, 0, 0, 1]

R_gimbal2imubody: [0, 1, 0, -1, 0, 0, 0, 0, 1] 

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree
min_confidence: 0.8

####-----cboard参数-----#####
quaternion_canid: 0x01
bullet_speed_canid: 0x110
send_canid: 0xff
can_interface: "can0"

quaternion_canid: 1
bullet_speed_canid: 272
send_canid: 255


#####-----tracker参数-----#####
min_detect_count: 5
max_temp_lost_count: 25
outpost_max_temp_lost_count: 75

#####-----aimer参数-----#####
yaw_offset: -0.8 # degree -2.5
pitch_offset: -1  # degree 2
comming_angle: 60 # degree
leaving_angle: 20 # degree
left_yaw_offset: -1
right_yaw_offset: -0.6
decision_speed: 10 # rad/s
high_speed_delay_time: 0.026 # s
low_speed_delay_time: 0.010 # s
fire_gap_time: 0.15   # 射击间隔时间 (秒)，根据你的射频调整，例如 0.1s - 0.2s
predict_time: 0.4     # 预测提前量 (秒)，根据实际延迟调整
#####-----shooter参数-----#####
first_tolerance: 5 # 近距离射击容差，degree
second_tolerance: 2 # 远距离射击容差，degree
judge_distance: 3 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击

#####-----decider参数-----#####
mode: 1

